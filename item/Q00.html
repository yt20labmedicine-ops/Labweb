<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title></title>

<style>
:root{
--nhi-primary:#1b7a84;
--nhi-head:#e6f2f3;
--nhi-border:#cfd8dc;
--nhi-bg:#f4f6f6;
--nhi-text:#263238;
}
body{
margin:0;
background:var(--nhi-bg);
font-family:"Microsoft JhengHei","PingFang TC",Arial,sans-serif;
color:var(--nhi-text);
}
.nhi-topbar{
background:var(--nhi-primary);
color:#fff;
padding:14px 18px;
font-weight:800;
font-size:18px;
}
.wrap{
max-width:1100px;
margin:18px auto;
padding:0 12px;
}
.card{
background:#fff;
border:1px solid var(--nhi-border);
border-radius:10px;
overflow:hidden;
box-shadow:0 2px 10px rgba(0,0,0,.04);
}
.cardhead{
padding:10px 14px;
border-bottom:1px solid var(--nhi-border);
font-weight:800;
color:#004d55;
}
table{
width:100%;
border-collapse:collapse;
}
th{
background:var(--nhi-head);
border:1px solid var(--nhi-border);
padding:12px;
text-align:center;
font-size:15px;
color:#004d55;
}
td.cell{
border:1px solid var(--nhi-border);
padding:12px;
text-align:center;
font-size:14px;
}
tr:hover td.cell{
background:#f0fbfc;
}
.link a{
text-decoration:none;
color:#0b5f86;
font-weight:700;
}
.link a:hover{
text-decoration:underline;
}
.footer{
text-align:center;
font-size:12px;
color:#607d8b;
margin-top:10px;
}
</style>
</head>

<body>
<div class="nhi-topbar">亞洲大學附屬醫院 檢驗科</div>

<div class="wrap">
  <div class="card">
    <div class="cardhead"></div>

    <table>
      <tr>
        <th>檢驗項目英文名稱</th>
        <th>檢驗項目中文名稱</th>
      </tr>
      
<tr>
  <td class="cell link"><a href="QuantiFERON.html">QuantiFERON</a></td>
  <td class="cell link"><a href="QuantiFERON.html">克肺癆結核菌感染檢測</a></td>
</tr>

    </table>
  </div>

  <div class="footer">快速搜尋可使用 Ctrl+F</div>
</div>
</body>
</html>
